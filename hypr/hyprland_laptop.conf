# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################



# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################
# See https://wiki.hypr.land/Configuring/Monitors/
#monitor=,preferred,auto,auto
source = colors.conf
monitor = eDP-1, 1920x1080@60, 0x0, 1

monitor = HDMI-A-1, preferred, auto, 1, mirror, eDP-1
monitor = , preferred, auto, 1, mirror, eDP-1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty -c ~/.config/kitty/kitty.conf
$fileManager = dolphin
$menu = fuzzel
$browser = zen-browser
$localmusic = $terminal cmus
$youtube = $browser --new-window https://www.youtube.com
$video_player = mpv
$emoji_picker = flatpak run it.mijorus.smile
$image = qimgv
$audioControl = wiremixer


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = waybar & hyprpaper & $terminal
exec-once = swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = copyq --start-server

exec-once = kbuildsycoca6 --noincremental

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus

env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = GTK_THEME,Monochrome

env = XDG_MENU_PREFIX,arch-
env = XDG_DATA_DIRS,/usr/local/share:/usr/share
env = KDEDIRS,/usr
###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 25

    border_size = 0

    col.active_border = rgba(23,147,209,0.5)
    col.inactive_border = rgba(0,0,0,0)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 3
        passes = 3
 	    ignore_opacity = true
    	new_optimizations = true
    	special = false
    	popups = true
    	xray = true

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
  enabled = yes

  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  bezier = been, 0.24, 0.9, 0.25, 0.91
  bezier = been2, 0,0.94,0.5,0.99
  bezier = menu_decel, 0.1, 1, 0, 1
  bezier = linear, 0.0, 0.0, 1.0, 1.0
  bezier = wind, 0.05, 0.9, 0.1, 1.0
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = slow, 0, 0.85, 0.3, 1
  bezier = overshot, 0.7, 0.6, 0.1, 1.1
  bezier = bounce, 1.1, 1.6, 0.1, 0.85
  bezier = sligshot, 1, -1, 0.15, 1.25
  bezier = nice, 0, 6.9, 0.5, -4.20

#  animation = windowsIn, 1, 5, slow, popin
  animation = windowsOut, 1, 7, been, popin 70%
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, linear
  animation = fade, 1, 5, overshot
  animation = workspaces, 1, 5, wind
  animation = windows, 1, 5, bounce, popin
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }
layerrule {
    name = swaync-control-center-rules
    match:namespace = swaync-control-center
    blur = true
    xray = false
}

layerrule {
    name = swaync-notification-window-rules
    match:namespace = swaync-notification-window
    blur = true
    xray = false
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
#dwindle {
#    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
#    preserve_split = true # You probably want this
#}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
#   vfr = true # save resources
}

render {
	new_render_scheduling = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = SUPER, Q, exec, $terminal
bind = SUPER, Z, exec, $menu
bind = SUPER, B, exec, $browser
bind = SUPER, C, killactive,
#bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = SUPER, E, exec, $fileManager
bind = SUPER, Space, togglefloating,
bind = SUPER, F, fullscreen
bind = SUPER, P, pseudo, # dwindle
# bind = SUPER, J, togglesplit, # dwindle

# screenshot full
bind = SUPER CTRL, S, exec, ~/.config/hypr/scripts/screenshot.sh
# screenshot select
bind = SUPER AlT, S, exec, ~/.config/hypr/scripts/select_region.sh
# screenshot preview
bind = SUPER, K, exec, ~/.config/hypr/scripts/screenshot_preview.sh
# wallpaper picker
bind = SUPER, M, exec, ~/.config/hypr/scripts/wallpaper_picker.sh
# cheatsheet
bind = SUPER, N, exec, kitty --title keybinds --override font_size=16 ~/.config/hypr/scripts/cheatsheet.sh


# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Resize windows
binde = SUPER SHIFT, left, resizeactive,-50 0
binde = SUPER SHIFT, right, resizeactive,50 0
binde = SUPER SHIFT, up, resizeactive,0 -50
binde = SUPER SHIFT, down, resizeactive,0 50

# Move  Windows
bind = SUPER CTRL, left, movewindow, l
bind = SUPER CTRL, right, movewindow, r
bind = SUPER CTRL, up, movewindow, u
bind = SUPER CTRL, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful
# ===========================
# WINDOW RULES
# ===========================

windowrule {
    name = browser-opacity
    match:class= zen-browser
    opacity = 1.0 1.0
}
windowrule =
# --- Suppress maximize events globally ---
windowrule {
    name = suppress-maximize-global
    match:class = .*
    suppress_event = maximize
}

# --- Fix XWayland dragging issues ---
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# --- Kitty Terminal ---

windowrule {
    name = kitty-animation
    match:class = kitty
    animation = slide
}

windowrule {
  name = move-kitty
  match:class = kitty

  move = 100 100
  animation = popin
}

# --- qimgv Image Viewer ---
windowrule {
    name = qimgv-float
    match:class = qimgv
    float = true
    size = 900 650
    center = true
}

# --- MPV Video Player ---
windowrule {
    name = mpv-layout
    match:class = mpv
    float = true
    size = 1280 720
    center = true
    opacity = 1.0 1.0
}
windowrule {
    name = mpv-idle-inhibit
    match:class = mpv
}
windowrule {
    name = mpv-immediate
    match:class = mpv
    immediate = true
}

# --- Wine Apps ---
windowrule {
    name = wine-float
    match:class = wine
    float = true
    center = true
    opacity = 1.0 1.0
}
windowrule {
    name = wine-exe-dialogs
    match:title = .*\.exe.*
    float = true
    center = true
}
windowrule {
    name = wine-mono-installer
    match:title = Wine Mono Installer
    float = true
    center = true
}
windowrule {
    name = wine-gecko-installer
    match:title = Wine Gecko Installer
    float = true
    center = true
}

# --- XWayland (Wine runs through this) ---
windowrule {
    name = xwayland-fix
    match:xwayland = true
    rounding = 0
}

# --- Common Dialog Windows ---
windowrule {
    name = dialog-open-file
    match:title = ^Open File.*
    float = true
    center = true
}
windowrule {
    name = dialog-save-as
    match:title = ^Save As.*
    float = true
    center = true
}
windowrule {
    name = dialog-confirm
    match:title = ^Confirm.*
    float = true
    center = true
}
windowrule {
    name = dialog-warning
    match:title = ^Warning.*
    float = true
    center = true
}
windowrule {
    name = dialog-error
    match:title = ^Error.*
    float = true
    center = true
}
windowrule {
    name = dialog-properties
    match:title = ^Properties.*
    float = true
    center = true
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

#FLOAT
windowrule = float tag:settings*
windowrule = float tag:viewer*
windowrule = float tag:multimedia_video*
windowrule = size 900 506 tag:multimedia_video*
windowrule = float class:^(org.pulseaudio.pavucontrol)$
windowrule = size 50% 60% class:^($audioControl)$
windowrule = size 80% 80% title:^(Save As|Save a File|Pick Files)$
windowrule = center title:^(Save As|Save a File|Pick Files)$
windowrule = float initialTitle:(Open Files)
windowrule = size 80% 80% initialTitle:(Open Files)
