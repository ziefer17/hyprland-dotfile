color9 #FF3300

# green (MAGI terminal green)
color2  #1A7A2E
color10 #22A83E

# yellow (warning amber)
color3  #CC7700
color11 #FF9900

# blue (void/night deep blue)
color4  #89B4FA
color12 #89B4FA
#color4  #0D1A33
#color12 #1A2E66

# magenta (entry plug purple)
color5  #6600AA
color13 #8800DD

# cyan (NERV holographic teal)
