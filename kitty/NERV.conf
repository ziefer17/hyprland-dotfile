# The basic colors
foreground              #FF8C42
background              #1A1B1B
selection_foreground    #0A0A0F
selection_background    #FF6600

# Cursor colors
cursor                  #FF6600
cursor_text_color       #0A0A0F

# URL underline color when hovering with mouse
url_color               #FF4500

# Kitty window border colors
active_border_color     #FF6600
inactive_border_color   #2E1A00
bell_border_color       #FF9900

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #0A0A0F
active_tab_background   #FF6600
inactive_tab_foreground #FF8C42
inactive_tab_background #110800
tab_bar_background      #0A0A0F

# Colors for marks (marked text in the terminal)
mark1_foreground #0A0A0F
mark1_background #FF6600
mark2_foreground #0A0A0F
mark2_background #8800DD
mark3_foreground #0A0A0F
mark3_background #009999

